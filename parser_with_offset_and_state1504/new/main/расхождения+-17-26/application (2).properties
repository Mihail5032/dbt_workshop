# ---------------------------- KAFKA
bootstrap.servers=mn-etlkfk01.x5.ru:9092,mn-etlkfk02.x5.ru:9092,mn-etlkfk03.x5.ru:9092
topic.name=002_019_00002
keytab.location=/opt/flink/data_stream4.keytab
keytab.principal=srv.data_stream@X5.RU

# ---------------------------- MIGRATION: Kafka start by timestamp
# Если задано — KafkaSource стартует с этой Unix-метки в миллисекундах.
# Если пусто/нет строки — earliest (как раньше).
# Flink игнорирует это при восстановлении из чекпоинта.
# Пример: 1760000000000 = 2025-10-09 09:33:20 UTC
# kafka.start.timestamp.ms=

# ---------------------------- MIGRATION: Iceberg bootstrap dedup state
# Включает разовый прогрев дедуп-стейта из таблицы Iceberg перед чтением Kafka.
# В обычной работе ВЫКЛЮЧИ (false) — нулевой оверхед.
bootstrap.enabled=true
bootstrap.window.days=3
bootstrap.catalog=core_flow_ing_raw
bootstrap.schema=core_flow_ing_raw
bootstrap.table=raw_bptransaction
# Fallback-таймер на флаш буфера, мс. 600000 = 10 мин.
bootstrap.wait.ms=600000
kafka.start.timestamp.ms=1776718800000

# ---------------------------- MIGRATION: parser startup delay
# Задержка старта IdocParser в мс. Пока парсер спит в open(), Kafka уходит
# в backpressure (сетевые буферы заполняются), а IcebergBootstrapSource
# успевает прогреть seenState — это защищает от OOM при большом стейте.
# 0 = выкл (default). 300000 = 5 мин. Ставь больше, если bootstrap дольше.
parser.startup.delay.ms=300000